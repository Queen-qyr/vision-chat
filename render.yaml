services:
  - type: web
    name: vision-chat
    runtime: node
    plan: free
    buildCommand: npm run install:all && npm run build
    startCommand: npm start
    envVars:
      - key: ZHIPU_API_KEY
        sync: false
      - key: ZHIPU_MODEL
        value: glm-4v-flash
      - key: NODE_VERSION
        value: "20"
